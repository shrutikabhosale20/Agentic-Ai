find_trending_companies:
  description: >
    Find 2-3 companies trending in {topic} for the year {current_year}.
  expected_output: >
    A list of 3 trending companies with a brief reason why they are trending.
  agent: trending_company_finder

research_trending_companies:
  description: >
    Analyze the companies found by the trending analyst. Look for financial health and recent news.
  expected_output: >
    A comprehensive financial report on the selected companies.
  agent: financial_researcher

pick_best_company:
  description: >
    Review the research and pick the single best company to invest in.
  expected_output: >
    A final recommendation with a detailed justification.
  agent: stock_picker
  