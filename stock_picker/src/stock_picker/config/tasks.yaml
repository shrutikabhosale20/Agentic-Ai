find_trending_companies:
  description: >
    Identify 2-3 companies trending in the {topic} sector for {current_year}.
  expected_output: >
    A list of 3 trending companies with a brief news trigger for each.

research_trending_companies:
  description: >
    Conduct a deep-dive financial analysis of the companies identified.
  expected_output: >
    A comprehensive financial report detailing the health of the companies.

pick_best_company:
  description: >
    Review the financial research and select the single best company for an 
    investor with a {risk_tolerance} risk profile.
  expected_output: >
    The name of the recommended company and a summary of its financial strengths.

portfolio_recommendation_task:
  description: >
    Synthesize all research into a final justification for {current_year}. 
    Focus on balancing growth against {risk_tolerance} constraints.
  expected_output: >
    A final recommendation with a 100-word bulleted summary and a 3-paragraph justification.